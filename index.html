<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Liz ❤️</title>

<style>
body{margin:0;font-family:'Segoe UI';overflow:hidden;}

/* PORTADA */
#inicio{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
position:relative;
overflow:hidden;
}

.luna{
position:absolute;
width:100px;height:100px;
background:white;border-radius:50%;
top:60px;right:60px;
box-shadow:0 0 30px white;
opacity:0.8;
}

.pareja{
position:absolute;
bottom:0;
width:220px;height:320px;
background:url('https://i.imgur.com/8QfQZ6F.png') no-repeat center/contain;
opacity:0.7;
}

.lluvia{
position:absolute;width:2px;height:15px;
background:rgba(255,255,255,0.4);
animation:caer 1.2s linear infinite;
}

@keyframes caer{
from{transform:translateY(-100vh);}
to{transform:translateY(100vh);}
}

.btn{
padding:15px 40px;
border:none;border-radius:40px;
font-size:20px;
background:white;color:#ff3366;
cursor:pointer;
z-index:2;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* CARTA */
#carta{
display:none;
height:100vh;
overflow:auto;
background:linear-gradient(135deg,#f5d7c6,#fcd5ce);
padding:20px;
}

.card{
max-width:900px;
margin:auto;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.texto{flex:1;}

/* ARBOL */
.arbol{
flex:1;
position:relative;
height:350px;
}

.tronco{
width:10px;
height:0;
background:#5d4037;
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
transition:height 3s;
}

/* HOJAS */
.hoja{
position:absolute;
opacity:0;
animation:aparecer 0.8s forwards;
}

@keyframes aparecer{to{opacity:1;}}

/* CORAZONES CAYENDO */
.caida{
position:fixed;
top:-20px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* TEXTO */
#typing{line-height:1.6;color:#333;}

/* CONTADOR */
#timer{margin-top:15px;font-weight:bold;}

#final{display:none;margin-top:10px;color:#ff3366;}
</style>
</head>

<body>

<div id="inicio">
<div class="luna"></div>
<div class="pareja"></div>
<h1>Para Liz…</h1>
<button class="btn" onclick="abrir()">Abrir ❤️</button>
</div>

<audio id="audio" loop>
<source src="Ed Sheeran - Perfect.mp3" type="audio/mpeg">
</audio>

<div id="carta">
<div class="card">

<div class="texto">
<div id="typing"></div>
<div id="timer"></div>
<button class="btn" onclick="mostrar()">Toca aquí ❤️</button>
<div id="final">Eres todo para mí ❤️</div>
</div>

<div class="arbol">
<div class="tronco" id="tronco"></div>
</div>

</div>
</div>

<script>

/* LLUVIA */
for(let i=0;i<60;i++){
let l=document.createElement("div");
l.className="lluvia";
l.style.left=Math.random()*100+"%";
l.style.animationDuration=(Math.random()+0.8)+"s";
inicio.appendChild(l);
}

function abrir(){
inicio.style.display="none";
carta.style.display="block";
audio.play();
escribir();
setInterval(timer,1000);
}

/* TEXTO */
const txt=`Para el amor de mi vida, mi Liz:

No existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.

Cuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí, firmes, siempre para ti.

Este contador no solo marca el tiempo, marca cada latido de mi corazón que te pertenece desde el primer día. Eres mi presente y quiero que seas siempre mi futuro.

Te amo mucho amor de mi vida.
MLOV`;

let i=0;
function escribir(){
if(i<txt.length){
typing.innerHTML+= txt[i]=="\n"?"<br>":txt[i];
i++;
setTimeout(escribir,25);
tronco.style.height="140px";
}else{
crearArbol();
lluviaCorazones();
}
}

/* ARBOL RELLENO */
function crearArbol(){
let cont=document.querySelector(".arbol");
let colores=["#ff3366","#ff6699","#ff99aa","#ff0033","#ff6f91","#ff8fab"];

for(let i=0;i<500;i++){
setTimeout(()=>{
let h=document.createElement("div");
h.className="hoja";
h.innerHTML="❤️";

let t=Math.random()*2*Math.PI;
let r=Math.sqrt(Math.random());

let x=16*Math.pow(Math.sin(t),3)*r;
let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*r;

h.style.left=`calc(50% + ${x*7}px)`;
h.style.top=`calc(45% + ${y*7}px)`;

h.style.fontSize=(Math.random()*8+12)+"px";
h.style.color=colores[Math.floor(Math.random()*colores.length)];

cont.appendChild(h);
},i*5);
}
}

/* CORAZONES DESDE EL ARBOL */
function lluviaCorazones(){
setInterval(()=>{
let c=document.createElement("div");
c.className="caida";
c.innerHTML="❤️";
c.style.left=(40 + Math.random()*20)+"%";
c.style.animationDuration=(Math.random()*3+3)+"s";
c.style.fontSize=(Math.random()*12+10)+"px";
document.body.appendChild(c);
setTimeout(()=>c.remove(),6000);
},400);
}

/* CONTADOR */
function timer(){
let inicio=new Date(2022,3,9);
let ahora=new Date();
let diff=ahora-inicio;

let a=Math.floor(diff/31557600000);
let d=Math.floor((diff%31557600000)/86400000);
let h=Math.floor((diff%86400000)/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

timer.innerHTML=`${a} años, ${d} días, ${h}h ${m}m ${s}s`;
}

function mostrar(){
final.style.display="block";
}

</script>

</body>
</html>
