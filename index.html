<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Liz ❤️</title>
<style>
    body{margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow:hidden; background:#fad0c4;}

    /* PORTADA */
    #inicio{
        height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column;
        color:white; background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
        position:relative; overflow:hidden; z-index: 100;
    }
    .luna{
        position:absolute; width:100px; height:100px; background:white; border-radius:50%;
        top:60px; right:60px; box-shadow:0 0-30px white; opacity:0.8;
    }
    .silueta{
        position:absolute; bottom:0; width:300px; height:350px;
        background: url('https://i.imgur.com/8QfQZ6F.png') no-repeat center bottom/contain;
        opacity:0.6; pointer-events: none;
    }
    .lluvia{
        position:absolute; width:2px; height:15px; background:rgba(255,255,255,0.4);
        animation:caer 1.2s linear infinite;
    }
    @keyframes caer{ from{transform:translateY(-100vh);} to{transform:translateY(100vh);} }

    /* CARTA */
    #carta{
        display:none; height:100vh; overflow:auto;
        background:linear-gradient(135deg,#f5d7c6,#fcd5ce); padding:20px;
    }
    .card{
        max-width:1000px; margin:20px auto; display:flex; gap:30px; flex-wrap:wrap;
        background: rgba(255, 255, 255, 0.4); padding: 40px; border-radius: 30px;
    }
    .texto{flex:1.2; min-width: 320px; z-index: 5;}
    .arbol-container{flex:1; position:relative; height:450px; min-width: 320px; display: flex; justify-content: center;}

    /* SEMILLA Y ARBOL */
    .semilla{
        position: absolute; width: 15px; height: 15px; background: #ff3366;
        border-radius: 50% 50% 50% 0; transform: rotate(-45deg); top: -50px;
        display: none;
    }
    @keyframes dropSeed {
        0% { top: -50px; opacity: 1; }
        100% { top: 400px; opacity: 0; }
    }
    .tronco{
        width:14px; height:0; background:#5d4037; position:absolute;
        bottom:30px; left:50%; transform:translateX(-50%); border-radius: 7px;
    }
    .hoja{ position:absolute; opacity:0; animation:aparecer 0.8s forwards; z-index: 2; }
    @keyframes aparecer{to{opacity:1;}}

    /* BOTONES Y EFECTOS */
    .btn{
        padding:15px 40px; border:none; border-radius:40px; font-size:20px;
        background:white; color:#ff3366; cursor:pointer; z-index:10;
        box-shadow:0 5px 20px rgba(0,0,0,0.2); transition: 0.3s;
    }
    .caida{ position:fixed; top:-20px; animation:fall linear infinite; z-index: 1; }
    @keyframes fall{ to{transform:translateY(110vh);} }

    #typing{line-height:1.7; color:#444; font-size: 17px; white-space: pre-wrap;}
    #reloj{margin-top:20px; font-weight:bold; color: #ff3366; font-size: 19px;}
    #final{display:none; margin-top:20px; color:#ff3366; font-size: 24px; font-weight: bold;}
</style>
</head>
<body>

<div id="inicio">
    <div class="luna"></div>
    <div class="silueta"></div>
    <h1>Te tengo un regalo Liz...</h1>
    <button class="btn" onclick="iniciarSorpresa()">Abrir ❤️</button>
</div>

<audio id="audio" loop>
    <source src="Perfect.mp3" type="audio/mpeg">
</audio>

<div id="carta">
    <div class="card">
        <div class="texto">
            <div id="typing"></div>
            <div id="reloj"></div>
            <button class="btn" id="btnFinal" style="margin-top: 15px; display: none;" onclick="mostrarFinal()">Toca aquí ❤️</button>
            <div id="final">Eres todo para mí ❤️</div>
        </div>
        <div class="arbol-container">
            <div id="semilla" class="semilla"></div>
            <div id="tronco" class="tronco"></div>
        </div>
    </div>
</div>

<script>
/* LLUVIA EN PORTADA */
const inicioDiv = document.getElementById("inicio");
for(let i=0; i<60; i++){
    let l=document.createElement("div");
    l.className="lluvia";
    l.style.left=Math.random()*100+"%";
    l.style.animationDuration=(Math.random()+0.8)+"s";
    inicioDiv.appendChild(l);
}

function iniciarSorpresa(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("carta").style.display="block";
    document.getElementById("audio").play().catch(() => console.log("Error al cargar Perfect.mp3"));
    
    // Animación de la semilla
    const semi = document.getElementById("semilla");
    semi.style.display = "block";
    semi.style.animation = "dropSeed 1.5s ease-in forwards";
    
    setTimeout(() => {
        semi.style.display = "none";
        crearArbolYTexto();
        setInterval(actualizarReloj, 1000);
    }, 1400);
}

const txt=`Para el amor de mi vida, mi Liz:

No existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.

Cuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí, firmes, siempre para ti.

Este contador no solo marca el tiempo, marca cada latido de mi corazón que te pertenece desde el primer día. Eres mi presente y quiero que seas siempre mi futuro.

Te amo mucho amor de mi vida.
MLOV`;

function crearArbolYTexto(){
    let charIdx=0;
    const typingDiv = document.getElementById("typing");
    const tronco = document.getElementById("tronco");
    tronco.style.height = "160px";
    
    function escribir(){
        if(charIdx < txt.length){
            typingDiv.innerHTML += txt[charIdx] == "\n" ? "<br>" : txt[charIdx];
            charIdx++;
            setTimeout(escribir, 30);
        } else {
            document.getElementById("btnFinal").style.display = "block";
        }
    }
    setTimeout(escribir, 500);

    // Arbol con MUCHO relleno (Referencia video)
    const cont = document.querySelector(".arbol-container");
    const colores = ["#ff3366","#ff6699","#ff99aa","#ff4d6d","#ff758f","#ff8fab"];
    
    for(let i=0; i<500; i++){
        setTimeout(()=>{
            let h=document.createElement("div");
            h.className="hoja";
            h.innerHTML="❤️";
            let t=Math.random()*2*Math.PI;
            let r=Math.sqrt(Math.random());
            let x=16*Math.pow(Math.sin(t),3)*r;
            let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*r;
            h.style.left=`calc(50% + ${x*8.5}px)`;
            h.style.top=`calc(35% + ${y*8.5}px)`;
            h.style.fontSize=(Math.random()*10+12)+"px";
            h.style.color=colores[Math.floor(Math.random()*colores.length)];
            cont.appendChild(h);
        }, 1500 + (i*3));
    }
    
    setInterval(()=>{
        let c=document.createElement("div");
        c.className="caida";
        c.innerHTML="❤️";
        c.style.left=Math.random()*100+"%";
        c.style.animationDuration=(Math.random()*3+4)+"s";
        c.style.color = colores[Math.floor(Math.random()*colores.length)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 7000);
    }, 400);
}

function actualizarReloj(){
    let fechaInicio=new Date(2022,3,9); 
    let ahora=new Date();
    let diff=ahora-fechaInicio;
    let a=Math.floor(diff/31557600000);
    let d=Math.floor((diff%31557600000)/86400000);
    let h=Math.floor((diff%86400000)/3600000);
    let m=Math.floor((diff%3600000)/60000);
    let s=Math.floor((diff%60000)/1000);
    document.getElementById("reloj").innerHTML=`Mi amor por ti nació hace...<br>${a} años, ${d} días, ${h}h ${m}m ${s}s`;
}

function mostrarFinal(){
    document.getElementById("final").style.display="block";
    document.getElementById("btnFinal").style.display="none";
}
</script>
</body>
</html>
