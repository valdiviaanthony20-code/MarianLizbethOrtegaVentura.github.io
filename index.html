<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz ❤️</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        
        #inicio {
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            flex-direction: column; color: white; position: relative;
        }

        /* FONDO CON TU IMAGEN DEL ATARDECER */
        .fondo-imagen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('Pareja.png') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* CAPA OSCURA PARA QUE EL TEXTO SE LEA BIEN */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); z-index: 2;
        }

        .contenido {
            position: relative; z-index: 10; text-align: center;
        }

        h1 { font-size: 28px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin-bottom: 20px; }

        .btn {
            padding: 15px 40px; border: none; border-radius: 40px; font-size: 20px;
            background: white; color: #ff3366; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); text-decoration: none;
            font-weight: bold; transition: 0.3s; display: inline-block;
        }
        .btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="inicio">
        <div class="fondo-imagen"></div>
        <div class="overlay"></div>
        
        <div class="contenido">
            <h1>Te tengo un regalo Liz...</h1>
            <a href="carta.html" class="btn">Abrir ❤️</a>
        </div>
    </div>
</body>
</html>
