<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz - MLOV</title>
    <style>
        body { background-color: #fff0f3; font-family: 'Arial', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; color: #d84343; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Pantalla Inicial */
        #inicio { padding: 20px; }
        .btn-abrir { background-color: #ff4d6d; color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4); animation: heartbeat 1.5s infinite; margin-top: 20px; }
        
        /* Arbol y Carta */
        #main-container { width: 90%; max-width: 500px; padding: 20px; }
        #canvas-container { position: relative; height: 250px; margin-bottom: 20px; }
        .trunk { width: 12px; height: 80px; background: #8B4513; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); border-radius: 5px; }
        .heart-leaf { position: absolute; color: #ff4d6d; font-size: 18px; animation: pop 0.5s ease forwards; opacity: 0; }
        
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Estilo del Mensaje */
        .carta-box { background: rgba(255, 255, 255, 0.9); padding: 25px; border-radius: 20px; border: 2px dashed #ffb3c1; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; min-height: 150px; }
        #typing-text { font-size: 17px; line-height: 1.6; font-weight: 500; text-align: justify; }
        .mlov { font-weight: bold; font-size: 20px; margin-top: 15px; display: block; text-align: center; }

        /* Estilo del Contador */
        #timer-container { background: #ff4d6d; color: white; padding: 15px; border-radius: 15px; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .timer-val { font-weight: bold; font-size: 18px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="inicio">
        <h1>Te tengo una sorpresa Liz...</h1>
        <button class="btn-abrir" onclick="comenzar()">Abrir</button>
    </div>

    <div id="main-container" class="hidden">
        <div id="canvas-container">
            <div class="trunk"></div>
        </div>

        <div class="carta-box">
            <div id="typing-text"></div>
        </div>

        <div id="timer-container">
            Mi amor por ti nació hace...
            <span id="timer" class="timer-val"></span>
        </div>
    </div>

    <script>
        function comenzar() {
            document.getElementById('inicio').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            generarArbol();
            typeWriter();
            setInterval(updateTimer, 1000);
        }

        function generarArbol() {
            const container = document.getElementById('canvas-container');
            const totalCorazones = 40;
            for(let i=0; i<totalCorazones; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-leaf';
                    heart.innerHTML = '❤️';
                    // Distribución en forma de corazón
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * 80;
                    const x = 16 * Math.pow(Math.sin(angle), 3);
                    const y = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));
                    
                    heart.style.left = `calc(50% + ${x * (Math.random() * 5 + 3)}px)`;
                    heart.style.top = `calc(40% + ${y * (Math.random() * 5 + 3)}px)`;
                    container.appendChild(heart);
                }, i * 100);
            }
        }

        const fechaInicio = new Date(2022, 3, 9, 12, 30, 0); // 9 de Abril 2022

        function updateTimer() {
            const ahora = new Date();
            const diff = ahora - fechaInicio;

            const años = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            const diasTotal = Math.floor(diff / (1000 * 60 * 60 * 24));
            const dias = Math.floor(diasTotal % 365.25);
            const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const segs = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerHTML = 
                `${años} años, ${dias} días, ${horas}h ${mins}m ${segs}s`;
        }

        const message = "Para el amor de mi vida, mi Liz: \n\nNo existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.\n\nCuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí, firmes, siempre para ti.\n\nEste contador no solo marca el tiempo, marca cada latido de mi corazón que te pertenece desde el primer día. Eres mi presente y quiero que seas siempre mi futuro.\n\nTe amo mucho amor de mi vida.\n\nMLOV"; 
        
        let i = 0;
        function typeWriter() {
            if (i < message.length) {
                const char = message.charAt(i);
                document.getElementById('typing-text').innerHTML += char === "\n" ? "<br>" : char;
                i++;
                setTimeout(typeWriter, 40);
            }
        }
    </script>
</body>
</html>
