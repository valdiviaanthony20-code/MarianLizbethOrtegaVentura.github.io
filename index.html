<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Liz ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
}

/* PORTADA */
#inicio{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1516589091380-5d8e87df6993');
    background-size:cover;
    background-position:center;
    text-align:center;
}

h1{
    font-size:40px;
    margin-bottom:20px;
}

.btn{
    padding:15px 40px;
    border:none;
    border-radius:40px;
    font-size:20px;
    background:white;
    color:#ff3366;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* CARTA */
#carta{
    display:none;
    height:100vh;
    overflow:auto;
    background: linear-gradient(135deg,#ff4d6d,#ff85a1);
    padding:20px;
}

.card{
    max-width:800px;
    margin:auto;
    background:#fff0f3;
    border-radius:25px;
    padding:20px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.texto{
    flex:1;
    font-size:15px;
    color:#333;
}

#typing{
    line-height:1.6;
}

.arbol{
    flex:1;
    position:relative;
    height:300px;
}

/* CORAZONES */
.corazon{
    position:absolute;
    animation:aparecer .5s ease forwards;
    opacity:0;
}

@keyframes aparecer{
    to{opacity:1; transform:scale(1);}
}

/* CONTADOR */
#timer{
    margin-top:15px;
    border-top:1px solid #ffccd5;
    padding-top:10px;
    font-weight:bold;
}

/* BOTON SORPRESA */
#sorpresa{
    margin-top:15px;
    display:none;
}

#mensajeFinal{
    display:none;
    margin-top:10px;
    color:#ff3366;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="inicio">
    <h1>Para Liz…</h1>
    <button class="btn" onclick="abrir()">Abrir ❤️</button>
</div>

<!-- AUDIO -->
<audio id="audio" loop>
    <source src="https://files.catbox.moe/k2h777.mp3" type="audio/mpeg">
</audio>

<!-- CARTA -->
<div id="carta">
    <div class="card">

        <div class="texto">
            <div id="typing"></div>
            <div id="timer"></div>

            <div id="sorpresa">
                <button class="btn" onclick="mostrarMensaje()">Toca aquí ❤️</button>
                <div id="mensajeFinal">
                    Si llegaste hasta aquí… es porque eres todo para mí ❤️
                </div>
            </div>
        </div>

        <div class="arbol" id="arbol"></div>

    </div>
</div>

<script>
function abrir(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("carta").style.display="block";
    document.getElementById("audio").play();
    escribir();
    crearCorazon();
    setInterval(timer,1000);
}

/* TEXTO */
const texto = `Para el amor de mi vida, mi Liz:

No existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.

Cuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí, firmes, siempre para ti.

Este contador no solo marca el tiempo, marca cada latido de mi corazón que te pertenece desde el primer día. Eres mi presente y quiero que seas siempre mi futuro.

Te amo mucho amor de mi vida.
MLOV`;

let i=0;
function escribir(){
    if(i<texto.length){
        document.getElementById("typing").innerHTML += 
        texto[i]=="\n" ? "<br>" : texto[i];
        i++;
        setTimeout(escribir,30);
    }else{
        document.getElementById("sorpresa").style.display="block";
    }
}

/* CORAZON */
function crearCorazon(){
    const cont=document.getElementById("arbol");
    const colores=["#ff3366","#ff6699","#ff99aa","#ff0033"];

    for(let i=0;i<200;i++){
        setTimeout(()=>{
            let c=document.createElement("div");
            c.className="corazon";
            c.innerHTML="❤️";

            let t=Math.random()*2*Math.PI;
            let x=16*Math.pow(Math.sin(t),3);
            let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

            c.style.left = `calc(50% + ${x*6}px)`;
            c.style.top = `calc(50% + ${y*6}px)`;
            c.style.fontSize = (Math.random()*10+10)+"px";
            c.style.color = colores[Math.floor(Math.random()*colores.length)];

            cont.appendChild(c);
        },i*20);
    }
}

/* CONTADOR */
function timer(){
    let inicio=new Date(2022,3,9);
    let ahora=new Date();
    let diff=ahora-inicio;

    let a=Math.floor(diff/31557600000);
    let d=Math.floor((diff%31557600000)/86400000);
    let h=Math.floor((diff%86400000)/3600000);
    let m=Math.floor((diff%3600000)/60000);
    let s=Math.floor((diff%60000)/1000);

    document.getElementById("timer").innerHTML=
    `${a} años, ${d} días, ${h}h ${m}m ${s}s`;
}

/* MENSAJE FINAL */
function mostrarMensaje(){
    document.getElementById("mensajeFinal").style.display="block";
}
</script>

</body>
</html>
