<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz - MLOV</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #ff0055 0%, #ff4d6d 50%, #ff85a1 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Arial', sans-serif; overflow: hidden;
        }

        #inicio { text-align: center; z-index: 10; color: white; }
        .btn-abrir { 
            background: white; color: #ff0055; border: none; padding: 18px 50px; 
            font-size: 24px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* ESTE ES EL CONTENEDOR TIPO TARJETA */
        #main-card {
            width: 95%; max-width: 600px; background: #fff5f7; border-radius: 30px;
            padding: 25px; color: #333; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            display: none; position: relative; z-index: 5;
        }

        /* DISEÑO DE DOS COLUMNAS COMO LA IMAGEN */
        .content-wrapper { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .text-side { flex: 1; text-align: left; }
        .tree-side { flex: 1; position: relative; height: 280px; }

        #tree-container { position: relative; height: 100%; width: 100%; }
        .trunk { 
            width: 16px; height: 70px; background: #5d4037; position: absolute; 
            bottom: 10px; left: 50%; transform: translateX(-50%); border-radius: 4px;
        }
        .leaf { position: absolute; animation: pop 0.5s ease-out forwards; opacity: 0; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #typing-text { font-size: 14px; line-height: 1.5; color: #444; margin-bottom: 15px; }
        .mlov-style { color: #ff0055; font-size: 24px; font-weight: bold; }
        
        #timer-box { margin-top: 15px; border-top: 1px solid #ffccd5; padding-top: 10px; }
        .timer-title { color: #ff0055; font-weight: bold; font-size: 13px; }
        .timer-nums { font-size: 15px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div id="inicio">
        <h1>Para Liz...</h1>
        <button class="btn-abrir" onclick="comenzar()">Abrir ❤️</button>
    </div>

    <audio id="musica" loop>
        <source src="https://files.catbox.moe/k2h777.mp3" type="audio/mpeg">
    </audio>

    <div id="main-card">
        <div class="content-wrapper">
            <div class="text-side">
                <div id="typing-text"></div>
                <div id="mlov-container"></div>
            </div>
            <div class="tree-side">
                <div id="tree-container"><div class="trunk"></div></div>
            </div>
        </div>
        
        <div id="timer-box">
            <div class="timer-title">Mi amor por ti comenzó hace...</div>
            <div id="timer" class="timer-nums"></div>
        </div>
    </div>

    <script>
        function comenzar() {
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';
            document.getElementById('musica').play().catch(() => {});
            crearArbol();
            escribir();
            setInterval(updateTimer, 1000);
        }

        function crearArbol() {
            const container = document.getElementById('tree-container');
            const colors = ['#ff0055', '#ff4d6d', '#ba68c8', '#ffeb3b', '#4caf50', '#2196f3'];
            for (let i = 0; i < 350; i++) {
                setTimeout(() => {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf';
                    leaf.style.color = colors[Math.floor(Math.random() * colors.length)];
                    leaf.innerHTML = '❤️';
                    const t = Math.random() * 2 * Math.PI;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    const r = Math.sqrt(Math.random());
                    leaf.style.left = `calc(50% + ${x * 7 * r}px)`;
                    leaf.style.top = `calc(40% + ${y * 7 * r}px)`;
                    leaf.style.fontSize = (Math.random() * 8 + 10) + 'px';
                    container.appendChild(leaf);
                }, i * 6);
            }
        }

        function updateTimer() {
            const inicio = new Date(2022, 3, 9); 
            const ahora = new Date();
            const diff = ahora - inicio;
            const años = Math.floor(diff / 31557600000);
            const dias = Math.floor((diff % 31557600000) / 86400000);
            const horas = Math.floor((diff % 86400000) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const segs = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerHTML = `${años} años, ${dias} días, ${horas}h ${mins}m ${segs}s`;
        }

        const msg = "Para el amor de mi vida, mi Liz: \n\nSi pudiera elegir un lugar seguro, sería a tu lado. Cuanto más tiempo paso contigo, más te amo. Eres tú quien ilumina mis días y me motiva a ser mejor.\n\n— I Love You! _";

        let idx = 0;
        function escribir() {
            if (idx < msg.length) {
                document.getElementById('typing-text').innerHTML += msg.charAt(idx) === "\n" ? "<br>" : msg.charAt(idx);
                idx++;
                setTimeout(escribir, 45);
            } else {
                document.getElementById('mlov-container').innerHTML = '<span class="mlov-style">MLOV</span>';
            }
        }
    </script>
</body>
</html>
