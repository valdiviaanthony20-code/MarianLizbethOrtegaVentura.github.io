<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz ❤️</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        
        #inicio {
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            flex-direction: column; color: white; position: relative;
        }

        /* FONDO CON TU IMAGEN */
        .fondo-imagen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('Pareja.png') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 2;
        }

        .contenido {
            position: relative; z-index: 10; text-align: center; width: 90%;
        }

        /* TEXTO MÁS GRANDE */
        h1 { 
            font-size: 3.5rem; 
            text-shadow: 3px 3px 15px rgba(0,0,0,0.9); 
            margin-bottom: 40px;
            font-weight: bold;
        }

        /* BOTÓN MÁS GRANDE Y CON ANIMACIÓN */
        .btn {
            padding: 20px 60px; 
            border: none; 
            border-radius: 50px; 
            font-size: 28px;
            background: #ff3366; 
            color: white; 
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 51, 102, 0.6); 
            text-decoration: none;
            font-weight: bold; 
            transition: 0.3s; 
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 51, 102, 0.6); }
            50% { transform: scale(1.1); box-shadow: 0 12px 35px rgba(255, 51, 102, 0.8); }
            100% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 51, 102, 0.6); }
        }

        .btn:hover { background: #ff5c8a; }

        /* Ajuste para celulares */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .btn { font-size: 22px; padding: 15px 45px; }
        }
    </style>
</head>
<body>
    <div id="inicio">
        <div class="fondo-imagen"></div>
        <div class="overlay"></div>
        
        <div class="contenido">
            <h1>Te tengo un regalo Liz...</h1>
            <a href="carta.html" class="btn">Abrir ❤️</a>
        </div>
    </div>
</body>
</html>
