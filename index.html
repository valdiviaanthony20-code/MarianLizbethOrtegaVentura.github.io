<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz - MLOV</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            /* Fondo de corazones desenfocados similar a la imagen */
            background: #000 url('https://img.freepik.com/fotos-premium/fondo-bokeh-corazon-rosa-borrosa_397143-391.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }

        #inicio { 
            text-align: center; z-index: 20; background: rgba(0,0,0,0.6); 
            padding: 30px; border-radius: 20px; color: white;
        }
        
        .btn-abrir { 
            background: #ff4d6d; color: white; border: none; padding: 15px 40px; 
            font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .btn-abrir:hover { transform: scale(1.1); background: #ff0055; }

        #main-card {
            width: 85%; max-width: 400px; background: #fdf2f2; border-radius: 40px;
            padding: 30px; color: #5d4037; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: left; position: relative; z-index: 5;
            display: none; border: 1px solid rgba(255,255,255,0.3);
        }

        .header-text { font-size: 14px; margin-bottom: 15px; font-weight: 600; }

        /* EL ÁRBOL DE LA IMAGEN */
        #tree-container { position: absolute; right: 20px; top: 80px; width: 180px; height: 220px; }
        .trunk { 
            width: 14px; height: 50px; background: #6d4c41; position: absolute; 
            bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 2px;
        }
        .leaf { position: absolute; color: #ff4d6d; animation: pop 0.5s ease-out forwards; opacity: 0; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #typing-text { 
            font-size: 14px; line-height: 1.5; width: 60%; min-height: 180px;
            color: #4e342e; margin-bottom: 20px;
        }

        .signature { font-size: 16px; font-weight: bold; margin-top: 10px; display: block; }
        
        .footer-timer { 
            border-top: 2px solid #6d4c41; padding-top: 10px; margin-top: 20px;
            font-size: 13px; color: #6d4c41;
        }
        .timer-nums { font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="inicio">
        <h1>Para Liz ❤️</h1>
        <p>Haz clic para ver tu sorpresa</p>
        <button class="btn-abrir" onclick="comenzar()">Ver Regalo</button>
    </div>

    <audio id="musica" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

    <div id="main-card">
        <div class="header-text">Para el amor de mi vida:</div>
        
        <div id="tree-container">
            <div class="trunk"></div>
        </div>

        <div id="typing-text"></div>
        
        <div class="signature">— I Love You! _</div>

        <div class="footer-timer">
            Mi amor por ti comenzó hace... <br>
            <span id="timer" class="timer-nums"></span>
        </div>
    </div>

    <script>
        function comenzar() {
            document.getElementById('inicio').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';
            
            // Intentar reproducir la música
            const audio = document.getElementById('musica');
            // Link alternativo funcional de Perfect (vía hosting externo si el anterior falla)
            audio.src = "https://files.catbox.moe/k2h777.mp3"; 
            audio.play();

            crearArbol();
            escribir();
            setInterval(updateTimer, 1000);
        }

        function crearArbol() {
            const container = document.getElementById('tree-container');
            const colors = ['#ff0055', '#ff4d6d', '#ff85a1', '#d81b60'];
            
            for (let i = 0; i < 250; i++) {
                setTimeout(() => {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf';
                    leaf.style.color = colors[Math.floor(Math.random() * colors.length)];
                    leaf.innerHTML = '❤️';
                    
                    // Forma de copa redonda/corazón
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 60;
                    const x = Math.cos(angle) * radius + 90;
                    const y = Math.sin(angle) * radius * 0.8 + 80;
                    
                    leaf.style.left = x + 'px';
                    leaf.style.top = y + 'px';
                    leaf.style.fontSize = (Math.random() * 8 + 8) + 'px';
                    container.appendChild(leaf);
                }, i * 10);
            }
        }

        function updateTimer() {
            const inicio = new Date(2022, 3, 9); // Tu fecha: 9 de Abril 2022
            const ahora = new Date();
            const diff = ahora - inicio;
            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const segs = Math.floor((diff / 1000) % 60);
            
            document.getElementById('timer').innerHTML = 
                `${dias} días ${horas} horas ${mins} minutos ${segs} segundos`;
        }

        const msg = "Si pudiera elegir un lugar seguro, sería a tu lado.\n\nCuanto más tiempo estoy contigo más te amo.\n\nEres lo mejor que me ha pasado, Liz.";

        let idx = 0;
        function escribir() {
            if (idx < msg.length) {
                const c = msg.charAt(idx);
                document.getElementById('typing-text').innerHTML += c === "\n" ? "<br>" : c;
                idx++;
                setTimeout(escribir, 50);
            }
        }
    </script>
</body>
</html>
