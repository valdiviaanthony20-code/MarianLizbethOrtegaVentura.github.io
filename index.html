<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz - MLOV</title>
    <style>
        :root {
            --fondo-vibrante: linear-gradient(135deg, #ff0055 0%, #ff4d6d 50%, #ff85a1 100%);
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--fondo-vibrante);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Efecto Bokeh y Corazones de Fondo */
        .bokeh {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 20%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 20%);
        }

        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            animation: floatUp 10s linear infinite;
            z-index: -1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .hidden { display: none !important; }

        /* Pantalla Inicial */
        #inicio { text-align: center; z-index: 10; padding: 20px; }
        h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-bottom: 30px; }
        .btn-abrir { 
            background: white; color: #ff0055; border: none; padding: 15px 50px; 
            font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.3s;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Contenedor Principal */
        #main-container {
            width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.95);
            border-radius: 30px; padding: 25px; color: #333; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center; position: relative; max-height: 85vh; overflow-y: auto;
        }

        /* Árbol Arreglado */
        #canvas-tree { position: relative; height: 180px; width: 100%; margin-bottom: 10px; }
        .trunk { 
            width: 10px; height: 60px; background: #5d4037; position: absolute; 
            bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 2px;
        }
        .branch {
            position: absolute; background: #5d4037; height: 4px; border-radius: 2px;
            transform-origin: left center;
        }
        .leaf { position: absolute; font-size: 14px; animation: bloom 0.8s ease-out forwards; opacity: 0; }
        @keyframes bloom { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Mensaje y Contador */
        #typing-text { font-size: 15px; line-height: 1.5; text-align: justify; color: #444; margin: 15px 0; }
        .mlov { font-weight: bold; font-size: 1.2rem; color: #ff0055; margin-top: 10px; display: block; }
        
        #timer-container { 
            background: #ffecf0; padding: 15px; border-radius: 20px; 
            border: 1px solid #ffb3c1; margin-top: 15px;
        }
        .timer-label { font-size: 14px; color: #ff0055; font-weight: bold; }
        .timer-val { font-size: 16px; font-weight: bold; color: #333; display: block; margin-top: 5px; }

        /* Audio Player Invisible */
        #player { display: none; }
    </style>
</head>
<body>

    <div class="bokeh"></div>
    <div id="bg-hearts-container"></div>

    <div id="inicio">
        <h1>Te tengo un regalo Liz...</h1>
        <button class="btn-abrir" onclick="comenzar()">Abrir</button>
    </div>

    <audio id="player" loop>
        <source src="https://www.myinstants.com/media/sounds/perfect-ed-sheeran-lyrics.mp3" type="audio/mpeg">
    </audio>

    <div id="main-container" class="hidden">
        <div id="canvas-tree">
            <div class="trunk"></div>
        </div>

        <div id="typing-text"></div>

        <div id="timer-container">
            <div class="timer-label">Mi amor por ti nació hace...</div>
            <span id="timer" class="timer-val"></span>
        </div>
    </div>

    <script>
        // Crear corazones de fondo
        const heartsContainer = document.getElementById('bg-hearts-container');
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.className = 'bg-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 10 + 's';
            heartsContainer.appendChild(heart);
        }

        function comenzar() {
            document.getElementById('inicio').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            document.getElementById('player').play();
            dibujarArbol();
            escribirTexto();
            setInterval(updateTimer, 1000);
        }

        function dibujarArbol() {
            const container = document.getElementById('canvas-tree');
            // Crear ramas base
            const ramas = [
                { w: 40, a: -45, b: 30 }, { w: 40, a: -135, b: 30 },
                { w: 30, a: -20, b: 45 }, { w: 30, a: -160, b: 45 }
            ];
            ramas.forEach(r => {
                const branch = document.createElement('div');
                branch.className = 'branch';
                branch.style.width = r.w + 'px';
                branch.style.left = '50%';
                branch.style.bottom = r.b + 'px';
                branch.style.transform = `rotate(${r.a}deg)`;
                container.appendChild(branch);
            });

            // Generar copa de corazón (100 corazones)
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf';
                    const colors = ['#ff0055', '#ff4d6d', '#ff85a1', '#ffb3c1'];
                    leaf.style.color = colors[Math.floor(Math.random() * colors.length)];
                    leaf.innerHTML = '❤️';
                    
                    const t = Math.random() * 2 * Math.PI;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    leaf.style.left = `calc(50% + ${x * 6}px)`;
                    leaf.style.top = `calc(40% + ${y * 6}px)`;
                    leaf.style.fontSize = (Math.random() * 10 + 10) + 'px';
                    container.appendChild(leaf);
                }, i * 50);
            }
        }

        function updateTimer() {
            const inicio = new Date(2022, 3, 9, 12, 0, 0); // 9 de Abril 2022
            const ahora = new Date();
            const diff = ahora - inicio;

            const años = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            const dias = Math.floor((diff / (1000 * 60 * 60 * 24)) % 365.25);
            const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const segs = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerHTML = 
                `${años} años, ${dias} días, ${horas}h ${mins}m ${segs}s`;
        }

        const texto = "Para el amor de mi vida, mi Liz: \n\nNo existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.\n\nCuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí, siempre para ti.\n\nEste contador no solo marca el tiempo, marca cada latido de mi corazón que te pertenece. Eres mi presente y mi futuro.\n\nTe amo mucho amor de mi vida.\n\nMLOV";

        let index = 0;
        function escribirTexto() {
            if (index < texto.length) {
                const char = texto.charAt(index);
                document.getElementById('typing-text').innerHTML += char === "\n" ? "<br>" : char;
                index++;
                setTimeout(escribirTexto, 35);
            }
        }
    </script>
</body>
</html>
