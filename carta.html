<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Liz ❤️</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3e9e2; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh;
        }

        .escena { position: relative; width: 100%; max-width: 900px; height: 100%; display: flex; align-items: center; }

        /* TEXTO Y CONTADOR A LA IZQUIERDA */
        .info { flex: 1; padding: 40px; z-index: 10; }
        #typing { font-size: 18px; color: #4a4a4a; line-height: 1.6; margin-bottom: 20px; min-height: 200px; }
        .contador { color: #ff4d6d; font-size: 16px; font-weight: bold; }

        /* CONTENEDOR DEL ÁRBOL A LA DERECHA */
        .arbol-container { flex: 1; position: relative; height: 100%; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 50px; }

        /* SEMILLA CAYENDO */
        .semilla {
            position: absolute; width: 10px; height: 10px; background: #ff4d6d; border-radius: 50%;
            top: -20px; animation: caer 1s ease-in forwards;
        }
        @keyframes caer { to { top: calc(100% - 60px); opacity: 0; } }

        /* TRONCO Y RAMAS */
        .tronco { 
            width: 10px; background: #5d4037; position: absolute; bottom: 50px; border-radius: 5px;
            height: 0; transition: height 1.5s ease-out 1s;
        }
        .rama {
            position: absolute; background: #5d4037; width: 4px; height: 0; border-radius: 2px;
            transform-origin: bottom center; transition: height 1s ease-out;
        }

        /* HOJAS (CORAZONES) */
        .hoja { position: absolute; font-size: 14px; opacity: 0; animation: brotar 0.5s forwards; }
        @keyframes brotar { to { opacity: 1; transform: scale(1.2); } }

        /* LLUVIA DE CORAZONES EN BUCLE */
        .caida {
            position: absolute; font-size: 12px; top: 30%;
            animation: lluvia 4s linear infinite;
        }
        @keyframes lluvia {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body onclick="document.getElementById('musica').play()">
    <audio id="musica" loop><source src="Perfect.mp3" type="audio/mpeg"></audio>

    <div class="escena">
        <div class="info">
            <div id="typing"></div>
            <div id="reloj" class="contador"></div>
        </div>
        <div class="arbol-container" id="escena-arbol">
            <div class="semilla"></div>
            <div id="tronco" class="tronco"></div>
        </div>
    </div>

    <script>
        const mensaje = "Para el amor de mi vida:\n\nSi pudiera elegir un lugar seguro en el mundo, sería a tu lado.\nCuanto más tiempo estoy contigo más te amo.\n\n— I Love You! _";
        const inicioReloj = new Date(2022, 3, 9);

        function iniciarAnimacion() {
            // 1. Cae la semilla (automático por CSS)
            
            // 2. Crece el tronco
            setTimeout(() => {
                const tronco = document.getElementById("tronco");
                tronco.style.height = "180px";
                crearRamas();
            }, 1000);

            // 3. Salen las hojas y empieza el texto
            setTimeout(() => {
                escribir();
                setInterval(actualizarReloj, 1000);
            }, 2500);
        }

        function crearRamas() {
            const container = document.getElementById("escena-arbol");
            for(let i=0; i<6; i++) {
                let rama = document.createElement("div");
                rama.className = "rama";
                rama.style.bottom = (100 + i*15) + "px";
                rama.style.left = "50%";
                rama.style.transform = `rotate(${i % 2 === 0 ? 45 + i*10 : -45 - i*10}deg)`;
                container.appendChild(rama);
                setTimeout(() => { rama.style.height = "60px"; }, 1500 + (i*200));
            }
            setTimeout(crearHojasPermanentes, 3000);
        }

        function crearHojasPermanentes() {
            const container = document.getElementById("escena-arbol");
            const colores = ["#ff4d6d", "#ff758f", "#ff8fa3", "#ffb3c1"];
            for(let i=0; i<150; i++) {
                setTimeout(() => {
                    let h = document.createElement("div");
                    h.className = "hoja"; h.innerHTML = "❤️";
                    let t = Math.random() * 2 * Math.PI;
                    let r = Math.sqrt(Math.random()) * 80;
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    h.style.left = `calc(50% + ${x * (r/10)}px)`;
                    h.style.bottom = `calc(180px + ${-y * (r/10)}px)`;
                    h.style.color = colores[Math.floor(Math.random()*colores.length)];
                    container.appendChild(h);
                }, i * 15);
            }
            setInterval(crearLluviaHojas, 300);
        }

        function crearLluviaHojas() {
            const container = document.getElementById("escena-arbol");
            let h = document.createElement("div");
            h.className = "caida"; h.innerHTML = "❤️";
            h.style.left = (Math.random() * 40 + 30) + "%";
            h.style.color = "#ffb3c1";
            container.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }

        function escribir() {
            let i = 0;
            function type() {
                if (i < mensaje.length) {
                    document.getElementById("typing").innerHTML += mensaje[i] === "\n" ? "<br>" : mensaje[i];
                    i++; setTimeout(type, 50);
                }
            }
            type();
        }

        function actualizarReloj() {
            const diff = new Date() - inicioReloj;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById("reloj").innerHTML = `${d} días ${h} horas ${m} min ${s} seg`;
        }

        window.onload = iniciarAnimacion;
    </script>
</body>
</html>
