<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Liz ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        #pantalla-inicio {
            position: fixed; width: 100%; height: 100%;
            background: url('Pareja.png') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        .boton-abrir {
            padding: 15px 45px; font-size: 1.6rem; background: #ff4d6d;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold;
        }

        #escena-final {
            position: relative; width: 100%; height: 100%;
            background: url('Fondo.png') no-repeat center center/cover;
            display: none;
        }

        #canvas-arbol { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }

        #contenedor-texto {
            position: absolute; top: 6%; left: 6%; width: 52%;
            color: #000000;
            font-family: 'Playfair Display', serif;
            font-size: 0.82rem; line-height: 1.35; z-index: 10;
            text-align: left; font-weight: 600;
        }

        /* --- AJUSTES DEL RELOJ --- */
        #contenedor-contador {
            position: absolute; 
            bottom: 6%; /* Un poco más arriba para que se note */
            left: 6%; /* Alineado a la izquierda */
            color: #000000;
            z-index: 10;
            text-align: left; /* Asegura alineación a la izquierda */
        }

        #mensaje-reloj { 
            font-size: 1rem; /* Un poco más grande para notarlo */
            font-weight: bold; 
            margin-bottom: 5px; /* Más espacio */
            font-family: 'Playfair Display', serif; 
        }

        #reloj { 
            font-size: 1.8rem; /* MUCHO MÁS GRANDE Y NOTORIO */
            font-weight: 800; /* Super negrita */
            font-family: 'Arial', sans-serif; /* Usamos una fuente sans-serif para mejor legibilidad del reloj, o mantén 'Playfair Display' si prefieres */
            color: #000; /* O #333 para que resalte más */
            white-space: nowrap; 
        }
    </style>
</head>
<body>

    <audio id="musica" src="Perfect.mp3" loop></audio>

    <div id="pantalla-inicio">
        <button class="boton-abrir" onclick="iniciar()">Abrir ❤️</button>
    </div>

    <div id="escena-final">
        <div id="contenedor-texto"></div>
        <div id="contenedor-contador">
            <div id="mensaje-reloj">Mi amor por ti comenzó hace...</div>
            <div id="reloj"></div>
        </div>
        <canvas id="canvas-arbol"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas-arbol');
        const ctx = canvas.getContext('2d');
        const musica = document.getElementById('musica');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const textoCarta = "Para el amor de mi vida, mi Liz:\nNo existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.\n\nCuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí siempre para ti.\n\nEste contador marca cada latido de mi corazón que te pertenece.\n\nTe amo mucho amor de mi vida.\nMLOV";

        const fechaInicio = new Date(2022, 3, 10, 15, 0, 0); 

        function iniciar() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('escena-final').style.display = 'block';
            musica.play();
            animarSemilla();
        }

        // --- NUEVA LÓGICA DE ANIMACIÓN DEL ÁRBOL ---

        function animarSemilla() {
            let y = -20;
            let x = canvas.width * 0.76; 
            let suelo = canvas.height * 0.84; 

            function caer() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d6d";
                ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill(); // Semilla un poco más grande
                y += 5; // Un poco más rápida la caída
                if (y < suelo) { requestAnimationFrame(caer); } 
                else { 
                    actualizarReloj();
                    escribirTexto();
                    crecerArbol(x, suelo); // Iniciar crecimiento
                }
            }
            caer();
        }

        // Función auxiliar para retardar la ejecución
        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        // Función para dibujar una rama (línea simple)
        function dibujarRama(x1, y1, x2, y2, grosor) {
            ctx.beginPath();
            ctx.strokeStyle = "#8b4513"; // Color marrón sienna (madera)
            ctx.lineWidth = grosor;
            ctx.lineCap = "round";
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        // Función principal del crecimiento del árbol secuencial
        async function crecerArbol(startX, startY) {
            const h = canvas.height;
            const trunkHeight = h * 0.25; // Altura del tronco principal
            const branchLen = h * 0.15; // Longitud de las primeras ramas
            
            // 1. Crecimiento del Tronco
            for (let i = 0; i <= trunkHeight; i += 2) {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpiar para animar tronco
                dibujarRama(startX, startY, startX, startY - i, 8);
                await delay(10); // Controla la velocidad de crecimiento
            }
            const trunkTopY = startY - trunkHeight;

            // Mantener el tronco dibujado
            function redibujarTronco() {
                dibujarRama(startX, startY, startX, trunkTopY, 8);
            }

            // 2. Ramas Primarias (Secuenciales)
            // Rama Izquierda
            const b1X = startX - Math.sin(30 * Math.PI/180) * branchLen;
            const b1Y = trunkTopY - Math.cos(30 * Math.PI/180) * branchLen;
            for (let i = 0; i <= branchLen; i += 2) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                redibujarTronco();
                dibujarRama(startX, trunkTopY, startX - Math.sin(30 * Math.PI/180) * i, trunkTopY - Math.cos(30 * Math.PI/180) * i, 6);
                await delay(15);
            }
            dibujarRama(startX, trunkTopY, b1X, b1Y, 6); // Asegurar dibujo final

            // Rama Derecha
            const b2X = startX + Math.sin(30 * Math.PI/180) * branchLen;
            const b2Y = trunkTopY - Math.cos(30 * Math.PI/180) * branchLen;
            for (let i = 0; i <= branchLen; i += 2) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                redibujarTronco();
                dibujarRama(startX, trunkTopY, b1X, b1Y, 6); // Mantener rama izq
                dibujarRama(startX, trunkTopY, startX + Math.sin(30 * Math.PI/180) * i, trunkTopY - Math.cos(30 * Math.PI/180) * i, 6);
                await delay(15);
            }
            dibujarRama(startX, trunkTopY, b2X, b2Y, 6);

            // 3. Ramas Secundarias (más cortas, estilo simple del video)
            const subBranchLen = branchLen * 0.6;
            
            // De la rama izq
            dibujarRama(b1X, b1Y, b1X - Math.sin(50 * Math.PI/180) * subBranchLen, b1Y - Math.cos(50 * Math.PI/180) * subBranchLen, 4);
            await delay(200);
            dibujarRama(b1X, b1Y, b1X + Math.sin(10 * Math.PI/180) * subBranchLen, b1Y - Math.cos(10 * Math.PI/180) * subBranchLen, 4);
            await delay(200);

            // De la rama der
            dibujarRama(b2X, b2Y, b2X - Math.sin(10 * Math.PI/180) * subBranchLen, b2Y - Math.cos(10 * Math.PI/180) * subBranchLen, 4);
            await delay(200);
            dibujarRama(b2X, b2Y, b2X + Math.sin(50 * Math.PI/180) * subBranchLen, b2Y - Math.cos(50 * Math.PI/180) * subBranchLen, 4);
            await delay(200);

            // 4. Crecimiento de la Copa de Corazones (Animación final)
            // Una vez dibujado el esquema simple, rellenamos con corazones.
            const copaCenterX = startX;
            const copaCenterY = trunkTopY - branchLen * 0.5; // Ajuste para que la copa envuelva las ramas
            dibujarCopaDeCorazones(copaCenterX, copaCenterY, branchLen * 1.6); // Radio de la copa
        }

        function dibujarCopaDeCorazones(centerX, centerY, radio) {
            // Generar muchos corazones estáticos en un área elíptica
            const numCorazones = 250; // Densidad
            let corazones = [];

            for (let i = 0; i < numCorazones; i++) {
                // Generar puntos dentro de una elipse
                const angle = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * radio;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r * 0.8; // Ligeramente aplanada

                // Variaciones de color estilo video
                const hue = Math.random() * 40 + 330; // De fucsia a rojo intenso
                const color = `hsl(${hue}, 100%, ${Math.random() * 20 + 50}%)`; // Variar brillo

                corazones.push({
                    x: x,
                    y: y,
                    s: Math.random() * 8 + 4, // Tamaños variados
                    c: color
                });
            }

            // Animación de aparición gradual de corazones
            let index = 0;
            function aparecerCorazones() {
                if (index < corazones.length) {
                    // Dibujar de a 3 para más velocidad
                    for(let j=0; j<3 && index < corazones.length; j++) {
                        const p = corazones[index];
                        dibujarCorazon(p.x, p.y, p.s, p.c);
                        index++;
                    }
                    requestAnimationFrame(aparecerCorazones);
                }
            }
            aparecerCorazones();
        }

        // --- FUNCIONES AUXILIARES (Texto, Reloj, Dibujo Corazón) ---

        function dibujarCorazon(x, y, s, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y-s/2, x-s, y-s/2, x-s, y);
            ctx.bezierCurveTo(x-s, y+s/2, x, y+s, x, y+s*1.2);
            ctx.bezierCurveTo(x, y+s, x+s, y+s/2, x+s, y);
            ctx.bezierCurveTo(x+s, y-s/2, x, y-s/2, x, y);
            ctx.fill();
        }

        function escribirTexto() {
            let i = 0;
            const div = document.getElementById('contenedor-texto');
            div.innerHTML = ""; // Limpiar antes
            function t() {
                if (i < textoCarta.length) {
                    div.innerHTML += textoCarta.charAt(i) === '\n' ? '<br>' : textoCarta.charAt(i);
                    i++; setTimeout(t, 45);
                }
            }
            t();
        }

        function actualizarReloj() {
            const diff = new Date() - fechaInicio;
            const a = Math.floor(diff / (1000*60*60*24*365.25));
            const d = Math.floor((diff / (1000*60*60*24)) % 365.25);
            const h = Math.floor((diff / (1000*60*60)) % 24);
            const m = Math.floor((diff / (1000*60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            // RELOJ EN UNA SOLA FILA
            document.getElementById('reloj').innerHTML = 
                `${a} años ${d} días ${h} horas ${m} minutos ${s} segundos`;
            
            setTimeout(actualizarReloj, 1000);
        }
    </script>
</body>
</html>
