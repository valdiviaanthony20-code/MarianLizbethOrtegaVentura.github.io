<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz ❤️</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3e9e2; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        /* PASTO ESTILO DIBUJO LIMPIO */
        .pasto {
            position: fixed; bottom: 0; width: 100%; height: 5px;
            background-color: #333; z-index: 10;
        }

        .contenedor { 
            display: flex; width: 95%; height: 90%; position: relative; z-index: 5; 
            align-items: center;
        }

        /* COLUMNA DE TEXTO */
        .col-texto { flex: 1; padding: 20px; z-index: 20; }
        #typing { font-size: 16px; color: #333; line-height: 1.6; white-space: pre-wrap; }
        .reloj { color: #ff4d6d; font-size: 18px; font-weight: bold; margin-top: 20px; }

        /* COLUMNA DEL ÁRBOL */
        .col-arbol { 
            flex: 1; position: relative; height: 100%; 
            display: flex; justify-content: center; align-items: flex-end; 
            padding-bottom: 5px; 
        }

        /* TRONCO DIBUJADO */
        .tronco {
            width: 14px; height: 0; background-color: #5d4037;
            border-radius: 7px 7px 0 0; transition: height 2s ease-out;
            position: relative;
        }

        /* HOJAS DE PRIMAVERA (CORAZONES) */
        .corazon {
            position: absolute; font-size: 18px; opacity: 0;
            animation: aparecer 0.8s forwards;
        }
        @keyframes aparecer { to { opacity: 1; transform: scale(1.1); } }

        /* LLUVIA DE HOJAS */
        .hoja-vuelo {
            position: absolute; font-size: 14px; z-index: 30;
            animation: volar 5s linear infinite;
        }
        @keyframes volar {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(-100px, 500px) rotate(720deg); opacity: 0; }
        }

        /* CAPA PARA INICIAR */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 233, 226, 0.9); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 24px; color: #ff4d6d; font-weight: bold;
        }
    </style>
</head>
