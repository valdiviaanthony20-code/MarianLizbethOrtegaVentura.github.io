<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Amor</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  display: flex;
  font-family: Arial, sans-serif;
}

/* cielo */
.escena {
  width: 60%;
  height: 100vh;
  position: relative;
  background: linear-gradient(to top, #87ceeb 60%, #bfe9ff 100%);
}

/* sol */
.sol {
  position: absolute;
  top: 30px;
  right: 40px;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, #ffd700, #ffb300);
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255, 223, 0, 0.8);
}

/* cesped */
.suelo {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 140px;
  background: linear-gradient(to top, #0b6623, #228b22);
}

/* semilla */
.semilla {
  width: 10px;
  height: 10px;
  background: #4b2e05;
  border-radius: 50%;
  position: absolute;
  top: 0;
  left: 50%;
}

/* arbol */
.arbol {
  position: absolute;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
}

/* tronco */
.tronco {
  width: 25px;
  height: 0;
  background: linear-gradient(to right, #3b1f0f, #7a4a2a);
  border-radius: 5px;
  margin: auto;
  animation: crecerTronco 3s forwards;
}

@keyframes crecerTronco {
  to { height: 180px; }
}

/* ramas */
.ramas div {
  width: 6px;
  height: 0;
  background: #5a2c0a;
  position: absolute;
  animation: crecerRama 2s forwards;
}

@keyframes crecerRama {
  to { height: 90px; }
}

/* hojas */
.hojas span {
  position: absolute;
  font-size: 18px;
  animation: caer 6s linear infinite;
}

@keyframes caer {
  0% { transform: translateY(0); opacity:1;}
  100% { transform: translateY(400px); opacity:0;}
}

/* lado derecho */
.lado {
  width: 40%;
  padding: 25px;
  background: rgba(0,0,0,0.3);
  color: white;
}

#texto {
  white-space: pre-line;
}
</style>
</head>

<body>

<audio id="music" src="perfect.mp3"></audio>

<div class="escena">

  <div class="sol"></div>
  <div class="suelo"></div>

  <div class="semilla" id="semilla"></div>

  <div class="arbol" id="arbol">
    <div class="tronco"></div>
    <div class="ramas" id="ramas"></div>
    <div class="hojas" id="hojas"></div>
  </div>

</div>

<div class="lado">
  <h3>Mi amor por ti comenzó hace...</h3>
  <p id="contador"></p>
  <p id="texto"></p>
</div>

<script>
const semilla = document.getElementById("semilla");
const arbol = document.getElementById("arbol");
const ramas = document.getElementById("ramas");
const hojas = document.getElementById("hojas");
const texto = document.getElementById("texto");
const music = document.getElementById("music");

window.onload = () => {
  music.play().catch(()=>{});
  caerSemilla();
  iniciarContador();
};

// semilla
function caerSemilla() {
  let top = 0;

  let intervalo = setInterval(() => {
    top += 5;
    semilla.style.top = top + "px";

    if (top >= window.innerHeight - 150) {
      clearInterval(intervalo);
      crecerArbol();
    }
  }, 20);
}

// arbol
function crecerArbol() {
  semilla.style.display = "none";
  arbol.style.display = "block";

  setTimeout(crearRamas, 2000);
  setTimeout(crearHojas, 3500);
  setTimeout(escribirTexto, 2000);
}

// ramas
function crearRamas() {
  for (let i = 0; i < 5; i++) {
    let rama = document.createElement("div");
    rama.style.left = (i * 25) + "px";
    ramas.appendChild(rama);
  }
}

// hojas
function crearHojas() {
  for (let i = 0; i < 40; i++) {
    let hoja = document.createElement("span");
    hoja.innerHTML = "❤️";
    hoja.style.left = Math.random() * 200 + "px";
    hoja.style.top = Math.random() * 100 + "px";
    hojas.appendChild(hoja);
  }
}

// texto animado
const mensaje = `Para el amor de mi vida, mi Liz:

No existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.

Cuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí, firmes, siempre para ti.

Este contador no solo marca el tiempo, marca cada latido de mi corazón que te pertenece desde el primer día. Eres mi presente y quiero que seas siempre mi futuro.

Te amo mucho amor de mi vida.
MLOV`;

function escribirTexto() {
  let i = 0;

  let intervalo = setInterval(() => {
    texto.innerHTML += mensaje[i];
    i++;
    if (i >= mensaje.length) clearInterval(intervalo);
  }, 30);
}

// contador
function iniciarContador() {
  const inicio = new Date("2020-01-01"); // CAMBIA ESTO

  setInterval(() => {
    let ahora = new Date();
    let diff = ahora - inicio;

    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    let años = Math.floor(dias / 365);
    let restoDias = dias % 365;

    document.getElementById("contador").innerHTML =
      `${años} años ${restoDias} días`;
  }, 1000);
}
</script>

</body>
</html>
