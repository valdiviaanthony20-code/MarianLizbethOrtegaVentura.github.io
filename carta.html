<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Liz ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #pantalla-inicio {
            position: fixed; width: 100%; height: 100%;
            background: url('Pareja.png') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        .boton-abrir {
            padding: 15px 45px; font-size: 1.6rem; background: #ff4d6d;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold;
        }

        #escena-final {
            position: relative; width: 100%; height: 100%;
            background: url('Fondo.png') no-repeat center center/cover;
            display: none;
        }

        #canvas-arbol { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }

        #contenedor-texto {
            position: absolute; top: 6%; left: 6%; width: 50%;
            color: #5d4037; font-size: 0.85rem; line-height: 1.4; z-index: 10;
            text-align: left; font-weight: bold;
        }

        /* DISEÑO DEL RELOJ DEBAJO DE LA LÍNEA */
        #contenedor-contador {
            position: absolute; 
            bottom: 3%; /* Ajustado para estar debajo de la línea negra */
            left: 0;
            width: 100%;
            text-align: center;
            color: #5d4037;
            z-index: 10;
            padding: 10px;
        }

        #mensaje-reloj { font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; }

        .reloj-grid {
            display: flex; justify-content: center; gap: 8px; font-weight: bold;
        }

        .unidad { display: flex; flex-direction: column; align-items: center; }
        .numero { font-size: 1.2rem; }
        .etiqueta { font-size: 0.6rem; text-transform: uppercase; opacity: 0.8; }
    </style>
</head>
<body>

    <audio id="musica" src="Perfect.mp3" loop></audio>

    <div id="pantalla-inicio">
        <button class="boton-abrir" onclick="iniciar()">Abrir ❤️</button>
    </div>

    <div id="escena-final">
        <div id="contenedor-texto"></div>
        <div id="contenedor-contador">
            <div id="mensaje-reloj">Mi amor por ti nació hace...</div>
            <div class="reloj-grid" id="reloj">
                </div>
        </div>
        <canvas id="canvas-arbol"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas-arbol');
        const ctx = canvas.getContext('2d');
        const musica = document.getElementById('musica');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const textoCarta = "Para el amor de mi vida, mi Liz:\nNo existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.\n\nCuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí siempre para ti.\n\nEste contador marca cada latido de mi corazón que te pertenece.\n\nTe amo mucho amor de mi vida.\nMLOV";

        // FECHA: 4 años, 3 días... (Ajustada según tu pedido)
        const fechaInicio = new Date(2022, 3, 10, 15, 0, 0); 

        function iniciar() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('escena-final').style.display = 'block';
            musica.play();
            animarSemilla();
        }

        function animarSemilla() {
            let y = -20;
            let x = canvas.width * 0.78; // Lado derecho
            let suelo = canvas.height * 0.80; // Altura de la línea negra

            function caer() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d6d";
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
                y += 6;
                if (y < suelo) { requestAnimationFrame(caer); } 
                else { 
                    actualizarReloj();
                    escribirTexto();
                    crecerArbol(x, suelo); 
                }
            }
            caer();
        }

        let corazonesHoja = [];
        let hojasCayendo = [];

        function crecerArbol(x, y) {
            function rama(x1, y1, len, ang, w) {
                if (len < 8) {
                    corazonesHoja.push({x: x1, y: y1, s: Math.random()*8+4, c: `hsl(${Math.random()*20 + 340}, 85%, 65%)`});
                    return;
                }
                ctx.beginPath();
                ctx.strokeStyle = "#4b2e1e";
                ctx.lineWidth = w;
                ctx.moveTo(x1, y1);
                let x2 = x1 + Math.sin(ang * Math.PI/180) * len;
                let y2 = y1 - Math.cos(ang * Math.PI/180) * len;
                ctx.lineTo(x2, y2);
                ctx.stroke();
                setTimeout(() => {
                    rama(x2, y2, len*0.8, ang-25, w*0.7);
                    rama(x2, y2, len*0.8, ang+25, w*0.7);
                }, 40);
            }
            rama(x, y, canvas.height*0.13, 0, 8);
            setTimeout(loopFlores, 1200);
        }

        function loopFlores() {
            ctx.clearRect(0, 0, canvas.width, canvas.height * 0.79);
            corazonesHoja.forEach(p => {
                dibujarCorazon(p.x, p.y, p.s, p.c);
                if (Math.random() < 0.004) hojasCayendo.push({...p, cy: p.y, cx: p.x});
            });
            hojasCayendo.forEach((h, i) => {
                h.cy += 1.8;
                h.cx += Math.sin(h.cy/25);
                dibujarCorazon(h.cx, h.cy, h.s, h.c);
                if (h.cy > canvas.height * 0.80) hojasCayendo.splice(i, 1);
            });
            requestAnimationFrame(loopFlores);
        }

        function dibujarCorazon(x, y, s, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y-s/2, x-s, y-s/2, x-s, y);
            ctx.bezierCurveTo(x-s, y+s/2, x, y+s, x, y+s*1.2);
            ctx.bezierCurveTo(x, y+s, x+s, y+s/2, x+s, y);
            ctx.bezierCurveTo(x+s, y-s/2, x, y-s/2, x, y);
            ctx.fill();
        }

        function escribirTexto() {
            let i = 0;
            const div = document.getElementById('contenedor-texto');
            function t() {
                if (i < textoCarta.length) {
                    div.innerHTML += textoCarta.charAt(i) === '\n' ? '<br>' : textoCarta.charAt(i);
                    i++;
                    setTimeout(t, 40);
                }
            }
            t();
        }

        function actualizarReloj() {
            const diff = new Date() - fechaInicio;
            const a = Math.floor(diff / (1000*60*60*24*365.25));
            const d = Math.floor((diff / (1000*60*60*24)) % 365.25);
            const h = Math.floor((diff / (1000*60*60)) % 24);
            const m = Math.floor((diff / (1000*60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById('reloj').innerHTML = `
                <div class="unidad"><span class="numero">${a}</span><span class="etiqueta">Años</span></div>
                <div class="unidad"><span class="numero">${d}</span><span class="etiqueta">Días</span></div>
                <div class="unidad"><span class="numero">${h}</span><span class="etiqueta">Horas</span></div>
                <div class="unidad"><span class="numero">${m}</span><span class="etiqueta">Mins</span></div>
                <div class="unidad"><span class="numero">${s}</span><span class="etiqueta">Segs</span></div>
            `;
            setTimeout(actualizarReloj, 1000);
        }
    </script>
</body>
</html>
