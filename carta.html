<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Liz ❤️</title>
    <style>
        /* FONDO BEIGE EXACTO AL VIDEO */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f3e9e2; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CONTENEDOR DE LA CARTA */
        .carta-container {
            width: 90%;
            max-width: 500px;
            padding-top: 50px;
            text-align: left;
            position: relative;
        }

        /* TEXTO QUE NO SE CORTA */
        #typing {
            font-size: 18px;
            color: #4a4a4a;
            line-height: 1.6;
            min-height: 150px;
            margin-bottom: 20px;
        }

        /* CONTADOR ESTILO VIDEO */
        .contador {
            color: #ff4d6d;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* ÁRBOL CENTRADO Y GRANDE */
        .arbol-box {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .tronco {
            width: 12px;
            height: 150px;
            background: #5d4037;
            position: absolute;
            bottom: 0;
            border-radius: 5px;
        }

        .hoja {
            position: absolute;
            font-size: 18px;
            opacity: 0;
            animation: aparecer 0.5s forwards;
        }

        @keyframes aparecer {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body onclick="playMusic()">

        <source src="Perfect.mp3" type="audio/mpeg">
    </audio>

    <div class="carta-container">
        <div id="typing"></div>
        <div id="reloj" class="contador"></div>
        
        <div class="arbol-box">

        </div>
    </div>

            if (index < mensaje.length) {
                let char = mensaje.charAt(index);
                document.getElementById("typing").innerHTML += char === "\n" ? "<br>" : char;

                setTimeout(escribir, 50);
