<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Liz ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        #pantalla-inicio {
            position: fixed; width: 100%; height: 100%;
            background: url('Pareja.png') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        .boton-abrir {
            padding: 15px 45px; font-size: 1.6rem; background: #ff4d6d;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold;
        }

        #escena-final {
            position: relative; width: 100%; height: 100%;
            background: url('Fondo.png') no-repeat center center/cover;
            display: none;
        }

        #canvas-arbol { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }

        #contenedor-texto {
            position: absolute; top: 5%; left: 8%; width: 55%;
            color: #000000;
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem; line-height: 1.3; z-index: 10;
            text-align: left; font-weight: 600;
        }

        #contenedor-contador {
            position: absolute; 
            bottom: 6%; 
            left: 8%; 
            right: 8%;
            color: #000000;
            z-index: 10;
        }

        #mensaje-reloj { 
            font-size: 0.95rem; 
            font-weight: bold; 
            margin-bottom: 4px;
            font-family: 'Playfair Display', serif; 
        }

        #reloj { 
            font-size: 1.15rem; 
            font-weight: 800; 
            font-family: 'Arial', sans-serif;
            display: block;
            line-height: 1.2;
        }

        @media screen and (max-width: 400px) {
            #reloj { font-size: 1rem; }
            #contenedor-texto { width: 65%; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <audio id="musica" src="Perfect.mp3" loop></audio>

    <div id="pantalla-inicio">
        <button class="boton-abrir" onclick="iniciar()">Abrir ❤️</button>
    </div>

    <div id="escena-final">
        <div id="contenedor-texto"></div>
        <div id="contenedor-contador">
            <div id="mensaje-reloj">Mi amor por ti comenzó hace...</div>
            <div id="reloj"></div>
        </div>
        <canvas id="canvas-arbol"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas-arbol');
        const ctx = canvas.getContext('2d');
        const musica = document.getElementById('musica');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const textoCarta = "Para el amor de mi vida, mi Liz:\nNo existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Si pudiera elegir un lugar seguro en todo el universo, sería siempre a tu lado, porque eres tú quien ilumina mis días y me motiva a ser mejor cada mañana.\n\nCuanto más tiempo paso contigo, más me doy cuenta de que eres el regalo más hermoso que la vida me ha dado. No importa cuántos años, días o segundos pasen; mi apoyo, mi ternura y mis ganas de verte cumplir cada uno de tus sueños estarán aquí siempre para ti.\n\nEste contador marca cada latido de mi corazón que te pertenece.\n\nTe amo mucho amor de mi vida.\nMLOV";

        const fechaInicio = new Date(2022, 3, 10, 15, 0, 0); 

        function iniciar() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('escena-final').style.display = 'block';
            musica.play();
            animarSemilla();
        }

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        function animarSemilla() {
            let y = -20;
            let x = canvas.width * 0.78; 
            let suelo = canvas.height * 0.84; 

            function caer() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d6d";
                ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
                y += 7;
                if (y < suelo) { requestAnimationFrame(caer); } 
                else { 
                    actualizarReloj();
                    escribirTexto();
                    crecerArbol(x, suelo); 
                }
            }
            caer();
        }

        async function crecerArbol(startX, startY) {
            const h = canvas.height;
            const trunkHeight = h * 0.22; 
            const baseWidth = 16; // Base ancha del tronco robusto

            // --- 1. CRECIMIENTO DEL TRONCO ROBUSTO (Cónico como image_21.png) ---
            for (let i = 0; i <= trunkHeight; i += 4) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Color marrón sólido y plano de image_21.png
                ctx.fillStyle = "#5d4037"; 
                
                ctx.beginPath();
                // Dibujar forma de tronco robusto (polígono)
                ctx.moveTo(startX - baseWidth, startY); // Base izq
                ctx.lineTo(startX + baseWidth, startY); // Base der
                ctx.lineTo(startX + 4, startY - i);      // Punta der (se estrecha)
                ctx.lineTo(startX - 4, startY - i);      // Punta izq
                ctx.closePath();
                ctx.fill();
                await delay(10);
            }
            
            const trunkTopY = startY - trunkHeight;

            // Redibujar el tronco fijo para lo que sigue
            function dibujarTroncoFijo() {
                ctx.fillStyle = "#5d4037";
                ctx.beginPath();
                ctx.moveTo(startX - baseWidth, startY);
                ctx.lineTo(startX + baseWidth, startY);
                ctx.lineTo(startX + 4, trunkTopY);
                ctx.lineTo(startX - 4, trunkTopY);
                ctx.closePath();
                ctx.fill();
            }

            // --- 2. RAMAS FINAS (Estilo dibujo de image_20.png) ---
            function dibujarRamaFina(x1, y1, x2, y2) {
                ctx.beginPath();
                ctx.strokeStyle = "#5d4037";
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            const branchLen = h * 0.14;
            // Puntos de ramificación principales
            const r1X = startX - 45, r1Y = trunkTopY - 55;
            const r2X = startX + 45, r2Y = trunkTopY - 55;

            // Animación secuencial de ramas finas
            dibujarRamaFina(startX, trunkTopY, r1X, r1Y);
            await delay(150);
            dibujarRamaFina(startX, trunkTopY, r2X, r2Y);
            await delay(150);
            dibujarRamaFina(r1X, r1Y, r1X - 25, r1Y - 35);
            dibujarRamaFina(r2X, r2Y, r2X + 25, r2Y - 35);
            dibujarRamaFina(startX, trunkTopY, startX, trunkTopY - 60); // Rama central fina

            // --- 3. COPA DE CORAZÓN (Mediana y en la Cima) ---
            // Se forma envolviendo las ramas finas, el tronco robusto queda limpio abajo
            dibujarCopaCorazon(startX, trunkTopY - 45); 
        }

        function dibujarCopaCorazon(centerX, centerY) {
            const numCorazones = 480; // Más mini corazones para que sea tupido
            let corazones = [];
            const escalaCopa = 11.5; // Ajusta el tamaño de la copa para que sea mediana como image_20.png

            for (let i = 0; i < numCorazones; i++) {
                // Fórmula paramétrica del corazón perfecta
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                // Añadimos dispersión para rellenar
                const r = Math.random();
                const posX = centerX + x * escalaCopa * r;
                const posY = centerY + y * escalaCopa * r;

                // Colores variados estilo image_20.png (tonos rojos y rosas)
                const hue = Math.random() * 35 + 335; 
                corazones.push({
                    x: posX, y: posY,
                    s: Math.random() * 7 + 3, // Tamaños mini variados
                    c: `hsl(${hue}, 100%, ${Math.random() * 25 + 45}%)`
                });
            }

            let index = 0;
            function animar() {
                if (index < corazones.length) {
                    for(let j=0; j<6; j++) { // Aparecen rápido
                        if(index < corazones.length) {
                            const p = corazones[index];
                            dibujarCorazon(p.x, p.y, p.s, p.c);
                            index++;
                        }
                    }
                    requestAnimationFrame(animar);
                }
            }
            animar();
        }

        function dibujarCorazon(x, y, s, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y-s/2, x-s, y-s/2, x-s, y);
            ctx.bezierCurveTo(x-s, y+s/2, x, y+s, x, y+s*1.2);
            ctx.bezierCurveTo(x, y+s, x+s, y+s/2, x+s, y);
            ctx.bezierCurveTo(x+s, y-s/2, x, y-s/2, x, y);
            ctx.fill();
        }

        function escribirTexto() {
            let i = 0;
            const div = document.getElementById('contenedor-texto');
            div.innerHTML = ""; // Limpiar antes
            function t() {
                if (i < textoCarta.length) {
                    div.innerHTML += textoCarta.charAt(i) === '\n' ? '<br>' : textoCarta.charAt(i);
                    i++; setTimeout(t, 40);
                }
            }
            t();
        }

        function actualizarReloj() {
            const diff = new Date() - fechaInicio;
            const a = Math.floor(diff / (1000*60*60*24*365.25));
            const d = Math.floor((diff / (1000*60*60*24)) % 365.25);
            const h = Math.floor((diff / (1000*60*60)) % 24);
            const m = Math.floor((diff / (1000*60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            // TEXTO COMPLETO Y CLARO
            document.getElementById('reloj').innerHTML = 
                `${a} años, ${d} días, ${h} horas, ${m} minutos y ${s} segundos`;
            
            setTimeout(actualizarReloj, 1000);
        }
    </script>
</body>
</html>
