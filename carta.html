<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz ❤️</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fcd5ce; overflow-x: hidden; color: #444; }
        
        /* Contenedor principal */
        .container { 
            max-width: 900px; 
            margin: auto; 
            padding: 30px 20px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            align-items: center; 
        }

        /* Bloque de Texto y Reloj */
        .texto-box { flex: 1.2; min-width: 300px; }
        #typing { font-size: 18px; line-height: 1.7; white-space: pre-wrap; margin-bottom: 25px; }
        
        #reloj { 
            font-weight: bold; 
            color: #ff3366; 
            font-size: 1.2rem; 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Bloque del Árbol */
        .arbol-box { 
            flex: 1; 
            position: relative; 
            height: 500px; 
            min-width: 320px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end;
        }

        .tronco { 
            width: 14px; 
            height: 0; 
            background: #5d4037; 
            border-radius: 10px 10px 0 0; 
            transition: height 2s ease-in-out;
            position: absolute;
            bottom: 50px;
        }

        .hoja { 
            position: absolute; 
            opacity: 0; 
            animation: aparecer 0.8s forwards; 
            z-index: 2;
        }

        @keyframes aparecer {
            to { opacity: 1; transform: scale(1.2); }
        }

    </style>
</head>
<body onload="iniciar()">

    <audio id="musica" loop>
        <source src="Perfect.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="texto-box">
            <div id="typing"></div>
            <div id="reloj"></div>
        </div>

        <div class="arbol-box">
            <div id="tronco" class="tronco"></div>
        </div>
    </div>

    <script>
        function iniciar() {
            // Reproducir música
            const audio = document.getElementById("musica");
            audio.play().catch(() => console.log("Música lista para sonar"));

            // Iniciar animaciones tras un pequeño delay
            setTimeout(() => {
                document.getElementById("tronco").style.height = "160px";
                escribirCarta();
                crearArbol();
                setInterval(actualizarReloj, 1000);
            }, 1000);
        }

        // Texto de la carta
        const texto = `Para el amor de mi vida, mi Liz:\n\nNo existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti. Eres mi presente y quiero que seas siempre mi futuro.\n\nTe amo mucho amor de mi vida.\nMLOV ❤️`;

        function escribirCarta() {
            let i = 0;
            const target = document.getElementById("typing");
            function type() {
                if (i < texto.length) {
                    target.innerHTML += texto[i] === "\n" ? "<br>" : texto[i];
                    i++;
                    setTimeout(type, 45);
                }
            }
            type();
        }

        function crearArbol() {
            const cont = document.querySelector(".arbol-box");
            const colores = ["#ff3366","#ff6699","#ff99aa","#ff4d6d","#ff8fab"];
            
            // Generamos 400 corazones para el relleno
            for(let i=0; i<400; i++) {
                setTimeout(() => {
                    let h = document.createElement("div");
                    h.className = "hoja";
                    h.innerHTML = "❤️";
                    
                    // Posicionamiento en forma de corazón (fórmula matemática)
                    let t = Math.random() * 2 * Math.PI;
                    let r = Math.sqrt(Math.random());
                    let x = 16 * Math.pow(Math.sin(t), 3) * r;
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
                    
                    h.style.left = `calc(50% + ${x * 9}px)`;
                    h.style.top = `calc(35% + ${y * 9}px)`;
                    h.style.color = colores[Math.floor(Math.random() * colores.length)];
                    h.style.fontSize = (Math.random() * 10 + 12) + "px";
                    
                    cont.appendChild(h);
                }, i * 8);
            }
        }

        function actualizarReloj() {
            // Fecha: 9 de abril de 2022
            const inicio = new Date(2022, 3, 9); 
            const ahora = new Date();
            const diff = ahora - inicio;

            const a = Math.floor(diff / 31557600000);
            const d = Math.floor((diff % 31557600000) / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById("reloj").innerHTML = `${a} años, ${d} días, ${h}h ${m}m ${s}s`;
        }
    </script>
</body>
</html>
