<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Liz ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        #pantalla-inicio {
            position: fixed; width: 100%; height: 100%;
            background: url('Pareja.png') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        .boton-abrir {
            padding: 15px 45px; font-size: 1.6rem; background: #ff4d6d;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold;
        }

        #escena-final {
            position: relative; width: 100%; height: 100%;
            background: url('Fondo.png') no-repeat center center/cover;
            display: none;
        }

        #canvas-arbol { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }

        #contenedor-texto {
            position: absolute; top: 5%; left: 8%; width: 60%;
            color: #000000;
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem; line-height: 1.35; z-index: 10;
            text-align: left; font-weight: 600;
        }

        #contenedor-contador {
            position: absolute; bottom: 5%; left: 8%; right: 8%;
            color: #000000; z-index: 10;
        }

        #mensaje-reloj { font-size: 0.95rem; font-weight: bold; margin-bottom: 2px; font-family: 'Playfair Display', serif; }
        #reloj { font-size: 1.1rem; font-weight: 800; font-family: 'Arial', sans-serif; display: block; line-height: 1.2; }

        @media screen and (max-width: 400px) {
            #reloj { font-size: 0.95rem; }
            #contenedor-texto { width: 70%; font-size: 0.72rem; }
        }
    </style>
</head>
<body>

    <audio id="musica" src="Perfect.mp3" loop></audio>

    <div id="pantalla-inicio">
        <button class="boton-abrir" onclick="iniciar()">Abrir ❤️</button>
    </div>

    <div id="escena-final">
        <div id="contenedor-texto"></div>
        <div id="contenedor-contador">
            <div id="mensaje-reloj">Mi amor por ti comenzó hace...</div>
            <div id="reloj"></div>
        </div>
        <canvas id="canvas-arbol"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas-arbol');
        const ctx = canvas.getContext('2d');
        const musica = document.getElementById('musica');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const textoCarta = "Para el amor de mi vida, mi Liz:\nSé que la vida nos ha puesto en caminos distintos por un tiempo, pero valoro muchísimo que hoy estemos aquí, intentándolo de nuevo desde la sinceridad y la amistad. Solo quiero disfrutar de volver a conocerte, de nuestras pláticas y de reconstruir poco a poco lo que eramos.\n\nGracias por permitirme estar cerca de ti otra vez; para mí, cada segundo que compartimos ahora es una nueva oportunidad para demostrarte lo especial que sigues siendo en mi vida... y que esta vez... dare todo de mi desde el inicio <3 espero te haya gustado.\n\nEste contador marca cada latido de mi corazón que te pertenece.\n\nTe amo mucho amor de mi vida.\nMLOV";

        const fechaInicio = new Date(2022, 3, 10, 15, 0, 0); 

        function iniciar() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('escena-final').style.display = 'block';
            musica.play();
            animarSemilla();
        }

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        function animarSemilla() {
            let y = -20;
            let x = canvas.width * 0.78; 
            let suelo = canvas.height * 0.85; 
            function caer() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d6d";
                ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
                y += 8;
                if (y < suelo) { requestAnimationFrame(caer); } 
                else { 
                    actualizarReloj();
                    escribirTexto();
                    crecerArbol(x, suelo); 
                }
            }
            caer();
        }

        async function crecerArbol(startX, startY) {
            const h = canvas.height;
            const trunkHeight = h * 0.23; 
            const baseWidth = 19; 

            for (let i = 0; i <= trunkHeight; i += 4) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#5d4037"; 
                ctx.beginPath();
                ctx.moveTo(startX - baseWidth + (i*0.06), startY); 
                ctx.lineTo(startX + baseWidth - (i*0.06), startY); 
                ctx.lineTo(startX + 2.5, startY - i);      
                ctx.lineTo(startX - 2.5, startY - i);      
                ctx.closePath();
                ctx.fill();
                await delay(12);
            }
            
            const trunkTopY = startY - trunkHeight;

            function dibujarRama(x1, y1, x2, y2) {
                ctx.beginPath();
                ctx.strokeStyle = "#5d4037";
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            dibujarRama(startX, trunkTopY, startX - 45, trunkTopY - 55);
            await delay(150);
            dibujarRama(startX, trunkTopY, startX + 45, trunkTopY - 55);
            await delay(150);
            dibujarRama(startX, trunkTopY, startX, trunkTopY - 70);

            dibujarCopaCorazon(startX, trunkTopY - 60); 
        }

        function dibujarCopaCorazon(centerX, centerY) {
            const numCorazones = 1500; 
            let corazones = [];
            const escalaCopa = 11.5; 

            for (let i = 0; i < numCorazones; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                let r = Math.random();
                if (r > 0.65) r = Math.random() * 0.65; 
                
                const posX = centerX + x * escalaCopa * r;
                const posY = centerY + y * escalaCopa * r;
                const hue = Math.random() * 45 + 325; 
                corazones.push({ x: posX, y: posY, s: Math.random() * 6.5 + 2.5, c: `hsl(${hue}, 100%, ${Math.random() * 25 + 45}%)` });
            }

            let idx = 0;
            function animar() {
                if (idx < corazones.length) {
                    for(let j=0; j<22; j++) {
                        if(idx < corazones.length) {
                            const p = corazones[idx];
                            ctx.fillStyle = p.c;
                            ctx.beginPath(); ctx.moveTo(p.x, p.y);
                            ctx.bezierCurveTo(p.x, p.y-p.s/2, p.x-p.s, p.y-p.s/2, p.x-p.s, p.y);
                            ctx.bezierCurveTo(p.x-p.s, p.y+p.s/2, p.x, p.y+p.s, p.x, p.y+p.s*1.2);
                            ctx.bezierCurveTo(p.x, p.y+p.s, p.x+p.s, p.y+p.s/2, p.x+p.s, p.y);
                            ctx.bezierCurveTo(p.x+p.s, p.y-p.s/2, p.x, p.y-p.s/2, p.x, p.y);
                            ctx.fill();
                            idx++;
                        }
                    }
                    requestAnimationFrame(animar);
                }
            }
            animar();
        }

        function escribirTexto() {
            let i = 0;
            const div = document.getElementById('contenedor-texto');
            function t() {
                if (i < textoCarta.length) {
                    div.innerHTML += textoCarta.charAt(i) === '\n' ? '<br>' : textoCarta.charAt(i);
                    i++; setTimeout(t, 32);
                }
            }
            t();
        }

        function actualizarReloj() {
            const diff = new Date() - fechaInicio;
            const a = Math.floor(diff / (1000*60*60*24*365.25));
            const d = Math.floor((diff / (1000*60*60*24)) % 365.25);
            const h = Math.floor((diff / (1000*60*60)) % 24);
            const m = Math.floor((diff / (1000*60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('reloj').innerHTML = `${a} años, ${d} días, ${h} horas, ${m} minutos y ${s} segundos`;
            setTimeout(actualizarReloj, 1000);
        }
    </script>
</body>
</html>
