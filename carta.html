<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }

        #pantalla-inicio {
            position: fixed; width: 100%; height: 100%;
            background: url('Pareja.png') no-repeat center/cover;
            display: flex; justify-content: center; align-items: center;
        }

        .boton-abrir {
            padding: 15px 40px; font-size: 1.5rem;
            background: #ff4d6d; color: white;
            border: none; border-radius: 50px;
        }

        #escena-final {
            display: none;
            width: 100%; height: 100%;
            background: url('Fondo.png') no-repeat center/cover;
            position: relative;
        }

        canvas { position: absolute; top: 0; left: 0; }

        #texto {
            position: absolute;
            top: 6%; left: 6%; width: 52%;
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            color: black;
        }

        #reloj-box {
            position: absolute;
            bottom: 5%; left: 6%;
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>

<body>

<audio id="musica" src="Perfect.mp3" loop></audio>

<div id="pantalla-inicio">
<button class="boton-abrir" onclick="iniciar()">Abrir ❤️</button>
</div>

<div id="escena-final">
<div id="texto"></div>
<div id="reloj-box">
Mi amor por ti comenzó hace...<br>
<span id="reloj"></span>
</div>
<canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const musica = document.getElementById("musica");

const textoCarta = `Para el amor de mi vida, mi Liz:
No existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti.

Eres mi lugar seguro.

Te amo ❤️`;

const fechaInicio = new Date(2022,3,10,15,0,0);

function iniciar(){
    document.getElementById("pantalla-inicio").style.display="none";
    document.getElementById("escena-final").style.display="block";
    musica.play();
    animarSemilla();
}

// SEMILLA
function animarSemilla(){
    let x = canvas.width*0.75;
    let y = -20;
    let suelo = canvas.height*0.85;

    function caer(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();
        ctx.arc(x,y,5,0,Math.PI*2);
        ctx.fillStyle="#ff4d6d";
        ctx.fill();
        y+=3;

        if(y<suelo){
            requestAnimationFrame(caer);
        } else {
            escribirTexto();
            actualizarReloj();
            crecerArbol(x,suelo);
        }
    }
    caer();
}

let corazonesEstaticos = [];
let corazonesVolando = [];

// ❤️ GENERAR CORAZÓN PERFECTO
function generarCorazon(cx,cy,escala){
    corazonesEstaticos = [];
    for(let t=0;t<Math.PI*2;t+=0.06){
        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        corazonesEstaticos.push({
            x: cx + x*escala,
            y: cy + y*escala,
            s: Math.random()*6+4,
            c: `hsl(${Math.random()*20 + 340},95%,60%)`
        });
    }
}

// ÁRBOL
function crecerArbol(x,y){
    function rama(x1,y1,len,ang,w){
        ctx.beginPath();
        ctx.strokeStyle="#4b2e1e";
        ctx.lineWidth=w;
        ctx.moveTo(x1,y1);

        let x2 = x1 + Math.sin(ang*Math.PI/180)*len;
        let y2 = y1 - Math.cos(ang*Math.PI/180)*len;

        ctx.lineTo(x2,y2);
        ctx.stroke();

        if(len<10){
            generarCorazon(x, y-150, 3.5);
            animacionFinal();
            return;
        }

        setTimeout(()=>{
            rama(x2,y2,len*0.8,ang-25,w*0.7);
            rama(x2,y2,len*0.8,ang+25,w*0.7);
        },60);
    }
    rama(x,y,120,0,8);
}

// ANIMACIÓN FINAL
function animacionFinal(){
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        corazonesEstaticos.forEach(p=>{
            dibujarCorazon(p.x,p.y,p.s,p.c);
        });

        requestAnimationFrame(draw);
    }
    draw();
}

function dibujarCorazon(x,y,s,color){
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
    ctx.bezierCurveTo(x-s,y+s,x,y+s,x,y+s*1.2);
    ctx.bezierCurveTo(x,y+s,x+s,y+s,x+s,y);
    ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
    ctx.fill();
}

// TEXTO
function escribirTexto(){
    let i=0;
    let div=document.getElementById("texto");

    function escribir(){
        if(i<textoCarta.length){
            div.innerHTML+=textoCarta[i]==="\n"?"<br>":textoCarta[i];
            i++;
            setTimeout(escribir,40);
        }
    }
    escribir();
}

// RELOJ
function actualizarReloj(){
    const diff=new Date()-fechaInicio;

    let d=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor((diff/(1000*60*60))%24);
    let m=Math.floor((diff/(1000*60))%60);
    let s=Math.floor((diff/1000)%60);

    document.getElementById("reloj").innerHTML=
    `${d} días ${h} horas ${m} minutos ${s} segundos`;

    setTimeout(actualizarReloj,1000);
}
</script>

</body>
</html>
