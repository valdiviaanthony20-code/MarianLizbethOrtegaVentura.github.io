<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Liz ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: black;
}

#pantalla-inicio {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('Pareja.png') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.boton-abrir {
    padding: 15px 40px;
    font-size: 1.5rem;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 50px;
}

#escena-final {
    display: none;
    width: 100%;
    height: 100%;
    background: url('Fondo.png') no-repeat center/cover;
    position: relative;
}

#canvas {
    position: absolute;
    top: 0;
    left: 0;
}

#texto {
    position: absolute;
    top: 5%;
    left: 5%;
    width: 50%;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: black;
}

#reloj-box {
    position: absolute;
    bottom: 5%;
    left: 5%;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
}
</style>
</head>

<body>

<audio id="musica" src="Perfect.mp3" loop></audio>

<div id="pantalla-inicio">
<button class="boton-abrir" onclick="iniciar()">Abrir ❤️</button>
</div>

<div id="escena-final">
<div id="texto"></div>
<div id="reloj-box">
Mi amor por ti comenzó hace...<br>
<span id="reloj"></span>
</div>
<canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const musica = document.getElementById("musica");

const textoCarta = `Para el amor de mi vida, mi Liz:
No existen palabras suficientes para decirte lo mucho que te amo, pero esta pequeña página es un pedacito de mi corazón para ti.

Eres mi lugar seguro, mi paz, mi todo.

Te amo muchísimo ❤️`;

const fechaInicio = new Date(2022, 3, 10, 15, 0, 0);

function iniciar(){
    document.getElementById("pantalla-inicio").style.display="none";
    document.getElementById("escena-final").style.display="block";
    musica.play();
    animarSemilla();
}

// 🌱 SEMILLA
function animarSemilla(){
    let x = canvas.width*0.75;
    let y = -20;
    let suelo = canvas.height*0.85;

    function caer(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.beginPath();
        ctx.arc(x,y,5,0,Math.PI*2);
        ctx.fillStyle="#ff4d6d";
        ctx.fill();
        y+=3;

        if(y<suelo){
            requestAnimationFrame(caer);
        } else {
            escribirTexto();
            actualizarReloj();
            crecerArbol(x,suelo);
        }
    }
    caer();
}

// 🌳 CRECER ÁRBOL
function crecerArbol(x,y){
    function rama(x1,y1,len,ang,w){
        ctx.beginPath();
        ctx.strokeStyle="#4b2e1e";
        ctx.lineWidth=w;
        ctx.moveTo(x1,y1);

        let x2 = x1 + Math.sin(ang*Math.PI/180)*len;
        let y2 = y1 - Math.cos(ang*Math.PI/180)*len;

        ctx.lineTo(x2,y2);
        ctx.stroke();

        if(len<10){
            generarCorazon(canvas.width*0.75, canvas.height*0.5, 4);
            animarCorazon();
            return;
        }

        setTimeout(()=>{
            rama(x2,y2,len*0.75,ang-25,w*0.7);
            rama(x2,y2,len*0.75,ang+25,w*0.7);
        },80);
    }

    rama(x,y,120,0,8);
}

// ❤️ GENERAR CORAZÓN PERFECTO
let corazones = [];

function generarCorazon(cx,cy,escala){
    for(let t=0;t<Math.PI*2;t+=0.05){
        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        corazones.push({
            x: cx + x*escala,
            y: cy + y*escala,
            s: Math.random()*6+3
        });
    }
}

// 💓 ANIMACIÓN DEL CORAZÓN
function animarCorazon(){
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        corazones.forEach(p=>{
            dibujarCorazon(p.x,p.y,p.s);
        });

        requestAnimationFrame(draw);
    }
    draw();
}

function dibujarCorazon(x,y,s){
    ctx.fillStyle="#ff4d6d";
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
    ctx.bezierCurveTo(x-s,y+s,x,y+s,x,y+s*1.2);
    ctx.bezierCurveTo(x,y+s,x+s,y+s,x+s,y);
    ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
    ctx.fill();
}

// ✍️ TEXTO
function escribirTexto(){
    let i=0;
    let div=document.getElementById("texto");

    function escribir(){
        if(i<textoCarta.length){
            div.innerHTML+=textoCarta[i]==="\n"?"<br>":textoCarta[i];
            i++;
            setTimeout(escribir,40);
        }
    }
    escribir();
}

// ⏱ RELOJ
function actualizarReloj(){
    const diff = new Date()-fechaInicio;

    let d=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor((diff/(1000*60*60))%24);
    let m=Math.floor((diff/(1000*60))%60);
    let s=Math.floor((diff/1000)%60);

    document.getElementById("reloj").innerHTML=
    `${d} días ${h} horas ${m} minutos ${s} segundos`;

    setTimeout(actualizarReloj,1000);
}
</script>

</body>
</html>
